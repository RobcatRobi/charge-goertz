<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Generate Icon 192x192</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@300;800&display=swap" rel="stylesheet">
</head>
<body style="margin:0;padding:20px;background:#111">
<h2 style="color:#fff;font-family:sans-serif">ChargeGörtz Icon 192x192</h2>
<p style="color:#aaa;font-family:sans-serif">Rechtsklick → "Bild speichern als..." → icon-192.png</p>
<canvas id="canvas" width="192" height="192" style="border:2px solid #00d4ff"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const size = 192;

// Background
ctx.fillStyle = '#060a0f';
ctx.fillRect(0, 0, size, size);

// Blitz
ctx.fillStyle = '#00d4ff';
ctx.beginPath();
ctx.moveTo(size/2, size*0.2);
ctx.lineTo(size/2 - 20, size*0.45);
ctx.lineTo(size/2 + 5, size*0.45);
ctx.lineTo(size/2, size*0.65);
ctx.lineTo(size/2 + 20, size*0.45);
ctx.lineTo(size/2 - 5, size*0.45);
ctx.closePath();
ctx.fill();

// Text "Charge"
ctx.font = "bold 28px 'Oxanium', sans-serif";
ctx.fillStyle = '#00d4ff';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.letterSpacing = '2px';
ctx.fillText('Charge', size/2, size*0.75);

// Text "Görtz"
ctx.font = "300 28px 'Oxanium', sans-serif";
ctx.fillStyle = '#5a7a9a';
ctx.fillText('Görtz', size/2, size*0.87);

// Auto-download
setTimeout(() => {
  const link = document.createElement('a');
  link.download = 'icon-192.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}, 1000);
</script>
</body>
</html>
