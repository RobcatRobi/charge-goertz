<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>ChargeGörtz</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #000;
  color: #fff;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.container {
  width: 100%;
  max-width: 400px;
  text-align: center;
}

/* WÄHREND LADEN */
.charging-view {
  display: none;
}

.charging-view.active {
  display: block;
}

.user-name {
  font-size: 48px;
  font-weight: 900;
  margin-bottom: 40px;
  letter-spacing: -1px;
}

.kwh-display {
  font-size: 72px;
  font-weight: 800;
  color: #00d4ff;
  margin-bottom: 20px;
  font-family: monospace;
}

.kwh-label {
  font-size: 20px;
  color: #666;
  margin-bottom: 40px;
}

.meta {
  display: flex;
  justify-content: center;
  gap: 40px;
  margin-bottom: 60px;
  font-size: 18px;
  color: #999;
}

.meta-value {
  font-weight: 700;
  color: #fff;
}

.btn-abort {
  width: 100%;
  padding: 24px;
  background: #ff4444;
  border: none;
  border-radius: 16px;
  font-size: 20px;
  font-weight: 700;
  color: #fff;
  cursor: pointer;
}

/* VOR LADEN */
.start-view {
  display: none;
}

.start-view.active {
  display: block;
}

.start-title {
  font-size: 24px;
  margin-bottom: 40px;
  color: #999;
}

.qr-btn {
  width: 100%;
  padding: 32px;
  background: #00d4ff;
  border: none;
  border-radius: 16px;
  font-size: 24px;
  font-weight: 700;
  color: #000;
  cursor: pointer;
  margin-bottom: 20px;
}

.auto-detect {
  width: 100%;
  padding: 24px;
  background: #222;
  border: 2px dashed #666;
  border-radius: 16px;
  font-size: 18px;
  color: #999;
  margin-bottom: 40px;
}

.divider {
  margin: 40px 0;
  color: #666;
  font-size: 14px;
}

.manual-btn {
  width: 100%;
  padding: 20px;
  background: #222;
  border: 1px solid #444;
  border-radius: 12px;
  font-size: 16px;
  color: #fff;
  cursor: pointer;
}

.hidden {
  display: none !important;
}
</style>
</head>
<body>

<div class="container">

  <!-- WÄHREND LADEN -->
  <div class="charging-view" id="charging-view">
    
    <div class="user-name" id="user-name">ROBERT GÖRTZ</div>
    
    <div class="kwh-display" id="kwh">18.4</div>
    <div class="kwh-label">kWh geladen</div>
    
    <div class="meta">
      <div>
        <span class="meta-value" id="power">7.2</span> kW
      </div>
      <div>
        <span class="meta-value" id="time">42</span> Min
      </div>
    </div>
    
    <button class="btn-abort" onclick="abortCharging()">
      ❌ ABBRUCH
    </button>
    
  </div>

  <!-- VOR LADEN -->
  <div class="start-view active" id="start-view">
    
    <div class="start-title">Laden starten</div>
    
    <button class="qr-btn" onclick="scanQR()">
      📱 QR-Code scannen
    </button>
    
    <div class="auto-detect" id="auto-status">
      🔍 Suche Auto / Standort...
    </div>
    
    <div class="divider">ODER</div>
    
    <button class="manual-btn" onclick="manualSelect()">
      Manuell auswählen
    </button>
    
  </div>

</div>

<script>
let isCharging = false;
let sessionData = null;

// QR-Code scannen
async function scanQR() {
  alert('QR-Scanner wird geöffnet...');
  // TODO: HTML5 QR Scanner
  // Nach erfolgreichem Scan → startCharging()
}

// Auto-Erkennung (GPS + Bluetooth)
async function autoDetect() {
  const status = document.getElementById('auto-status');
  
  try {
    // 1. GPS Check
    status.textContent = '📍 Prüfe Standort...';
    const pos = await getLocation();
    
    if(isNearStation(pos)) {
      status.textContent = '✅ An Ladesäule erkannt!';
      status.style.borderColor = '#00e676';
      status.style.color = '#00e676';
      
      // TODO: Auto via Bluetooth erkennen
      // Dann automatisch starten
      setTimeout(() => {
        // Beispiel: Robert erkannt
        startCharging({
          userId: 1,
          name: 'ROBERT GÖRTZ'
        });
      }, 2000);
      
    } else {
      status.textContent = '❌ Zu weit entfernt - QR scannen';
      status.style.borderColor = '#ff4444';
      status.style.color = '#ff4444';
    }
    
  } catch(e) {
    status.textContent = '⚠️ GPS/Bluetooth nicht verfügbar';
    status.style.borderColor = '#ffa000';
  }
}

function getLocation() {
  return new Promise((resolve, reject) => {
    if(!navigator.geolocation) {
      reject(new Error('GPS nicht verfügbar'));
      return;
    }
    navigator.geolocation.getCurrentPosition(
      pos => resolve({
        lat: pos.coords.latitude,
        lon: pos.coords.longitude
      }),
      err => reject(err)
    );
  });
}

function isNearStation(pos) {
  // Neerach: 47.5166, 8.5142
  const stationLat = 47.5166;
  const stationLon = 8.5142;
  
  const distance = getDistance(
    pos.lat, pos.lon,
    stationLat, stationLon
  );
  
  return distance < 50; // 50 Meter Radius
}

function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371e3; // Erdradius in Meter
  const φ1 = lat1 * Math.PI/180;
  const φ2 = lat2 * Math.PI/180;
  const Δφ = (lat2-lat1) * Math.PI/180;
  const Δλ = (lon2-lon1) * Math.PI/180;
  
  const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
            Math.cos(φ1) * Math.cos(φ2) *
            Math.sin(Δλ/2) * Math.sin(Δλ/2);
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  
  return R * c; // Meter
}

// Manuell wählen
function manualSelect() {
  // TODO: Simple Liste mit Namen
  const user = prompt('Wer lädt?\n1 = Robert\n2 = Cintia\n3 = Carolina\n4 = Sabrina');
  
  const names = ['ROBERT GÖRTZ', 'CINTIA GÖRTZ', 'CAROLINA', 'SABRINA'];
  
  if(user && user >= 1 && user <= 4) {
    startCharging({
      userId: parseInt(user),
      name: names[user-1]
    });
  }
}

// LADEN STARTEN
function startCharging(user) {
  isCharging = true;
  sessionData = {
    userId: user.userId,
    name: user.name,
    startedAt: Date.now(),
    kwh: 0,
    power: 0,
    chf: 0
  };
  
  // UI Switch
  document.getElementById('start-view').classList.remove('active');
  document.getElementById('charging-view').classList.add('active');
  
  // Name setzen
  document.getElementById('user-name').textContent = user.name;
  
  // Start Polling
  updateLiveData();
  setInterval(updateLiveData, 2000);
}

// LADEN ABBRECHEN
function abortCharging() {
  if(!confirm('Laden wirklich abbrechen?')) return;
  
  isCharging = false;
  
  // TODO: Session in Supabase speichern
  // TODO: Relay ausschalten
  
  alert(`✅ Beendet!\n${sessionData.kwh.toFixed(1)} kWh geladen`);
  
  // UI zurück
  document.getElementById('charging-view').classList.remove('active');
  document.getElementById('start-view').classList.add('active');
  
  sessionData = null;
}

// LIVE UPDATE
async function updateLiveData() {
  if(!isCharging) return;
  
  // TODO: Shelly API abrufen
  const power = 7.2; // kW (von Shelly)
  
  // Zeit berechnen
  const elapsed = (Date.now() - sessionData.startedAt) / 60000; // Minuten
  
  // kWh berechnen
  const kwh = (power * elapsed / 60).toFixed(1);
  
  // UI Update
  document.getElementById('kwh').textContent = kwh;
  document.getElementById('power').textContent = power.toFixed(1);
  document.getElementById('time').textContent = Math.floor(elapsed);
  
  sessionData.kwh = parseFloat(kwh);
  sessionData.power = power;
}

// INIT
window.addEventListener('DOMContentLoaded', () => {
  // Auto-Erkennung starten
  autoDetect();
});
</script>

</body>
</html>
